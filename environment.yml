name: 3d-brain-ssl-env
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy
  - scipy
  - pandas
  - scikit-learn
  - scikit-image
  - nibabel
  - simpleitk
  - pyyaml
  - tqdm
  - matplotlib
  - seaborn
  - openpyxl
  - pytorch==2.2.2
  - torchvision==0.17.2
  - torchaudio==2.2.2
  - pytorch-cuda=12.1
  - pip:
      # Core ML framework
      - "lightning>=2.1.4"
      - "torch==2.2.2"
      - "torchmetrics==1.4.0.post0"
      # fomo25 / yucca ecosystem
      - "yucca==2.2.6"
      - "nnunetv2>=2.4.2"
      - "batchgenerators>=0.23"
      - "connected-components-3d>=3.12.4"
      # Model components
      - "einops>=0.7"
      - "timm>=0.9.8"
      - "monai>=1.3.0"
      - "fvcore>=0.1.5"
      # Vision
      - "opencv-python>=4.8.1.78"
      # Experiment tracking
      - "wandb>=0.16.0"
      # BraTS-MEN evaluation
      - "surface-distance"
      # Utilities
      - "python-dotenv==1.0.0"
      - "weave>=0.39.0"